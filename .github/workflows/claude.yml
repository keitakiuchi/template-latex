name: Claude AI Assistant CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/reusable-python-checks.yml
    with:
      python-version: "3.11"

  claude-assistant:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '@claude') &&
      vars.ENABLE_TEMPLATE_AI_WORKFLOWS == 'true' &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )

    steps:
    - name: Template Stub Notice
      run: |
        echo "::error::This job is a template stub. Replace it with a real Claude integration before setting ENABLE_TEMPLATE_AI_WORKFLOWS=true."
        exit 1

  claude-review:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request_review' &&
      contains(github.event.review.body, '@claude') &&
      vars.ENABLE_TEMPLATE_AI_WORKFLOWS == 'true' &&
      (
        github.event.review.author_association == 'OWNER' ||
        github.event.review.author_association == 'MEMBER' ||
        github.event.review.author_association == 'COLLABORATOR'
      )

    steps:
    - name: Template Stub Notice
      run: |
        echo "::error::This job is a template stub. Replace it with a real Claude review integration before setting ENABLE_TEMPLATE_AI_WORKFLOWS=true."
        exit 1
