# このプロジェクトのルールファイル構成や使用方法については、README.mdの「📋 ルールファイル構成」セクションをご確認ください。

name: Codex TDD Workflow

on:
  workflow_dispatch:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]

permissions:
  contents: read

jobs:
  codex-tdd:
    runs-on: ubuntu-latest
    if: >
      vars.ENABLE_TEMPLATE_AI_WORKFLOWS == 'true' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'issues' &&
          (
            github.event.issue.author_association == 'OWNER' ||
            github.event.issue.author_association == 'MEMBER' ||
            github.event.issue.author_association == 'COLLABORATOR'
          ) &&
          (
            contains(github.event.issue.title, '@codex') ||
            contains(github.event.issue.body, '@codex')
          )
        ) ||
        (
          github.event_name == 'issue_comment' &&
          (
            github.event.comment.author_association == 'OWNER' ||
            github.event.comment.author_association == 'MEMBER' ||
            github.event.comment.author_association == 'COLLABORATOR'
          ) &&
          contains(github.event.comment.body, '@codex')
        )
      )

    steps:
    - name: Template Stub Notice
      run: |
        echo "::error::This job is a template stub. Replace it with a real Codex automation before setting ENABLE_TEMPLATE_AI_WORKFLOWS=true."
        exit 1
