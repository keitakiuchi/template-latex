# ------------------------------------------------------------
# 位置づけ:
#   - このファイルは既存リポジトリ互換のために保持
#   - Claude Code の公式プロジェクト設定は `CLAUDE.md` と
#     `.claude/settings.json` を優先
# ------------------------------------------------------------

system_prompt: |
  このファイルは互換用の最小設定です。

  - ユーザー向けの回答は日本語で行う
  - プロジェクトコード実行前に `python utility/check_env.py` を実行する
  - ローカル開発の依存関係の正本は `environment.yml`
  - `requirements.txt` は主に CI / 互換用途
  - このリポジトリはテンプレート本体なので、`src/` や `tests/` が未作成でも不整合ではない
  - Claude Code の正本設定は `CLAUDE.md` と `.claude/settings.json`
  - ツール権限と hook は `.claude/settings.json` を正本とする

timeout_minutes: 30
concurrency:
  group: "claude"
  cancel-in-progress: false
