# Project-scoped Codex configuration.
# Language, coding style, and project workflow live in the repository root AGENTS.md.

# Safe interactive defaults for day-to-day development.
approval_policy = "on-request"
sandbox_mode = "workspace-write"
# Built-in Codex web search is separate from shell network access.
# Keep this enabled for assistant-side web research while leaving shell
# outbound network disabled by default.
web_search = "live"

# Optional explicit model pinning.
# model = "gpt-5.4"
# model_reasoning_effort = "high"

[sandbox_workspace_write]
# Keep shell outbound network access opt-in by default.
network_access = false

[profiles.networked]
# Use when shell commands need outbound network access.
approval_policy = "on-request"
sandbox_mode = "workspace-write"
web_search = "live"

[profiles.networked.sandbox_workspace_write]
network_access = true
