# Codex CLI/IDE configuration for the template-latex project.
#  - Keeps default interactions in Japanese to match the repository docs.
#  - Mirrors the local harness defaults (workspace-write sandbox with network access).

model = "gpt-5"
model_reasoning_effort = "high"
approval_policy = "on-failure"
sandbox_mode = "workspace-write"

[codex]
response_language = "ja"
welcome_message = "template-latex リポジトリ用 Codex セッションです。作業前に python utility/start.py を実行して環境を確認してください。"
repo_root = "${workspace_root}"

[sandbox_workspace_write]
network_access = true

[profiles.web_search]
approval_policy = "on-failure"
sandbox_mode = "workspace-write"
network_access = true

[paths]
plan_dir = "plan"
results_dir = "results"
workbench_dir = "workbench"
figures_dir = "figures"
tex_dir = "tex"

# Example profile for temporarily locking the workspace.
#[profiles.readonly]
#approval_policy = "never"
#sandbox_mode = "read-only"
